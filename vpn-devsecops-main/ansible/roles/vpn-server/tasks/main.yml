---
- name: Installer strongSwan
  apt:
    name:
      - strongswan
      - strongswan-pki
      - libcharon-extra-plugins
      - libstrongswan-extra-plugins
    state: present
    update_cache: yes

- name: Déployer ipsec.conf depuis le template
  template:
    src: ipsec.conf.j2
    dest: /etc/ipsec.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart strongswan

- name: Déployer ipsec.secrets depuis le template
  template:
    src: ipsec.secrets.j2
    dest: /etc/ipsec.secrets
    owner: root
    group: root
    mode: '0600'
  notify: restart strongswan

- name: Activer et démarrer strongSwan
  systemd:
    name: strongswan-starter
    enabled: yes
    state: started

# ─── Installation et configuration OpenVPN ────────────────────
- name: Installer OpenVPN
  apt:
    name: openvpn
    state: present
    update_cache: yes

- name: Créer le répertoire OpenVPN serveur
  file:
    path: /etc/openvpn/server
    state: directory
    mode: '0700'

- name: Créer le répertoire des logs OpenVPN
  file:
    path: /var/log/openvpn
    state: directory
    mode: '0755'

- name: Déployer server.conf depuis le template
  template:
    src: server.conf.j2
    dest: /etc/openvpn/server/server.conf
    owner: root
    group: root
    mode: '0600'
  notify: restart openvpn-server

- name: Activer le forwarding IP
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: yes

- name: Activer et démarrer OpenVPN serveur
  systemd:
    name: openvpn-server@server
    enabled: yes
    state: started
