[defaults]
roles_path = /home/ubuntu/vpn-devsecops/ansible/roles
inventory  = /home/ubuntu/vpn-devsecops/ansible/inventories/dev.ini
remote_user = ubuntu
private_key_file = ~/.ssh/ed25519
host_key_checking = False
timeout = 60

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[privilege_escalation]
become = False
become_method = sudo
become_ask_pass = False
