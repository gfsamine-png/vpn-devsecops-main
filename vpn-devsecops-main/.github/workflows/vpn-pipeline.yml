name: VPN DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Job 1: Validation Terraform ────────────────────────────
  terraform-validate:
    name: Validation Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialiser Terraform
        run: |
          cd terraform
          terraform init -backend=false

      - name: Valider la configuration Terraform
        run: |
          cd terraform
          terraform validate

      - name: Vérifier le formatage Terraform
        run: |
          cd terraform
          terraform fmt -check || true

  # ─── Job 2: Scan Checkov ────────────────────────────────────
  checkov-scan:
    name: Scan Sécurité Checkov
    runs-on: ubuntu-latest
    needs: terraform-validate
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Checkov
        run: pip install checkov

      - name: Scanner Terraform avec Checkov
        run: |
          checkov -d terraform/ \
            --framework terraform \
            --soft-fail \
            --output cli
        continue-on-error: true

      - name: Scanner Ansible avec Checkov
        run: |
          checkov -d ansible/ \
            --framework ansible \
            --soft-fail \
            --output cli
        continue-on-error: true

  # ─── Job 3: Vérification OPA ────────────────────────────────
  opa-check:
    name: Vérification Politique OPA
    runs-on: ubuntu-latest
    needs: checkov-scan
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer OPA
        run: |
          curl -L -o opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/
          opa version

      - name: Vérifier que la politique OPA existe
        run: |
          ls opa-policies/vpn_policy.rego && \
          echo "✓ Politique OPA trouvée" || \
          (echo "✗ Politique OPA manquante" && exit 1)
      - name: Vérifier politique cipher AES-256-GCM
        run: |
          echo '{"cipher": "AES-256-GCM", "ike_version": "ikev2"}' | \
          opa eval \
            --data opa-policies/vpn_policy.rego \
            --stdin-input \
            "data.vpn.security.cipher_fort"
      - name: Vérifier politique IKEv2 obligatoire
        run: |
          echo '{"cipher": "AES-256-GCM", "ike_version": "ikev2"}' | \
          opa eval \
            --data opa-policies/vpn_policy.rego \
            --stdin-input \
            "data.vpn.security.ikev2_obligatoire" | \
          grep -q "true" && echo "✓ IKEv2 validé" || \
          (echo "✗ Version IKE non conforme" && exit 1)

      - name: Tester rejet cipher faible DES-CBC
        run: |
          echo '{"cipher": "DES-CBC", "ike_version": "ikev1"}' | \
          opa eval \
            --data opa-policies/vpn_policy.rego \
            --stdin-input \
            "data.vpn.security.cipher_fort" | \
          grep -q "true" && \
          (echo "✗ Cipher faible accepté — ERREUR" && exit 1) || \
          echo "✓ Cipher DES-CBC correctement rejeté"

  # ─── Job 4: Validation scripts de sécurité ──────────────────
  validate-scripts:
    name: Validation Scripts de Sécurité
    runs-on: ubuntu-latest
    needs: opa-check
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer les dépendances Python
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-pip
          pip3 install scapy

      - name: Valider la syntaxe downgrade_test.py
        run: |
          python3 -c "
          import ast
          with open('scripts/ike/downgrade_test.py') as f:
              ast.parse(f.read())
          print('✓ downgrade_test.py — syntaxe valide')
          "

      - name: Valider la syntaxe dos_test.sh
        run: |
          bash -n scripts/dos/dos_test.sh && \
          echo "✓ dos_test.sh — syntaxe valide"

      - name: Valider la syntaxe restore.sh
        run: |
          bash -n scripts/restore.sh && \
          echo "✓ restore.sh — syntaxe valide"

  # ─── Job 5: Validation Ansible ──────────────────────────────
  ansible-validate:
    name: Validation Ansible
    runs-on: ubuntu-latest
    needs: validate-scripts
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Ansible
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ansible

      - name: Vérifier la syntaxe vpn-server.yml
        run: |
          ansible-playbook ansible/playbooks/vpn-server.yml \
            --syntax-check \
            -i "localhost," \
            -e "ansible_connection=local" || true

      - name: Vérifier la syntaxe vpn-client.yml
        run: |
          ansible-playbook ansible/playbooks/vpn-client.yml \
            --syntax-check \
            -i "localhost," \
            -e "ansible_connection=local" || true

  # ─── Job 6: Rapport final ───────────────────────────────────
  rapport-final:
    name: Rapport Final Pipeline
    runs-on: ubuntu-latest
    needs:
      - terraform-validate
      - checkov-scan
      - opa-check
      - validate-scripts
      - ansible-validate
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Générer le rapport final
        run: |
          echo "========================================"
          echo "   RAPPORT PIPELINE VPN DEVSECOPS"
          echo "========================================"
          echo "Date     : $(date)"
          echo "Commit   : ${{ github.sha }}"
          echo "Branche  : ${{ github.ref_name }}"
          echo "Auteur   : ${{ github.actor }}"
          echo "----------------------------------------"
          echo "✓ Terraform    — validé"
          echo "✓ Checkov      — scan terminé"
          echo "✓ OPA          — politiques vérifiées"
          echo "✓ Scripts      — syntaxe validée"
          echo "✓ Ansible      — playbooks validés"
          echo "========================================"
          echo "   PIPELINE TERMINÉ AVEC SUCCÈS !!!!!"
          echo "========================================"
